<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Months of Us ✨</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Sacramento&display=swap" rel="stylesheet">

  <style>
    /* Reset & General Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: #0b0c10;
      font-family: 'Montserrat', sans-serif;
      color: #f8fafc;
      /* Cozy room lighting ambient background */
      background: 
        radial-gradient(circle at 15% 15%, rgba(253, 224, 71, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(147, 51, 234, 0.06) 0%, transparent 45%),
        linear-gradient(to bottom, #0d0c15, #050408);
      transition: background 2s ease;
    }
    
    body.sky-active {
      background: radial-gradient(circle at top, #090a1e 0%, #03040c 60%, #000002 100%);
    }

    /* Title Card Loader Overlay */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #020205;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 1;
      transition: opacity 1.5s ease;
    }
    
    .loader-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      color: #fff;
      letter-spacing: 4px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInOutLoader 4.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      text-shadow: 0 0 25px rgba(255, 255, 255, 0.45);
      text-align: center;
      padding: 20px;
    }
    
    @keyframes fadeInOutLoader {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      25%, 75% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-15px);
      }
    }

    /* 3D Book Container */
    .book-container {
      position: relative;
      width: 90vw;
      max-width: 430px;
      height: 75vh;
      max-height: 540px;
      perspective: 1500px;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 1.5s ease-out, transform 1.5s ease-out;
      z-index: 10;
      overflow: visible;
    }
    
    .book-container.visible {
      opacity: 1;
      transform: scale(1);
    }
    
    .book-container.dissolve {
      opacity: 0;
      transform: scale(0.9) translateY(-40px);
      pointer-events: none;
    }
    
    .book {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
    }
    
    /* Subtle 3D tilt when opened */
    .book.opened {
      transform: rotateX(8deg) rotateY(-3deg);
    }

    /* Book Covers and Pages */
    .book-cover {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1), box-shadow 1.5s ease;
      z-index: 5;
      cursor: pointer;
      box-shadow: 6px 10px 28px rgba(0, 0, 0, 0.55);
      border-radius: 0 10px 10px 0;
    }
    
    .book-cover-front {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #ebdcd0;
      /* Textured linen cover effect */
      background-image: 
        repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 4px);
      border-radius: 0 10px 10px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      box-sizing: border-box;
      backface-visibility: hidden;
      border-left: 5px solid #ab822e;
      box-shadow: inset -6px 0 12px rgba(0,0,0,0.08);
    }
    
    .book-cover-back {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #dfcfc2;
      background-image: 
        repeating-linear-gradient(90deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 4px);
      border-radius: 10px 0 0 10px;
      transform: rotateY(180deg);
      backface-visibility: hidden;
      box-shadow: inset 8px 0 16px rgba(0,0,0,0.12);
    }
    
    /* Book thickness effect underneath pages */
    .book-back {
      position: absolute;
      width: 98%;
      height: 98%;
      top: 1%;
      left: 1%;
      background: #fcfbfa;
      border: 1px solid #e2d2c3;
      border-radius: 6px;
      box-shadow: 2px 4px 15px rgba(0, 0, 0, 0.25);
      z-index: 1;
    }
    
    /* Book corner protectors (brass caps) */
    .book-corner {
      position: absolute;
      width: 32px;
      height: 32px;
      pointer-events: none;
      border: 1.5px solid #ab822e;
      z-index: 6;
    }
    
    .book-corner.top-left {
      top: 10px;
      left: 10px;
      border-right: none;
      border-bottom: none;
      background: linear-gradient(135deg, rgba(171, 130, 46, 0.2) 0%, rgba(171, 130, 46, 0.2) 50%, transparent 50%);
    }
    
    .book-corner.top-right {
      top: 10px;
      right: 10px;
      border-left: none;
      border-bottom: none;
      background: linear-gradient(225deg, rgba(171, 130, 46, 0.2) 0%, rgba(171, 130, 46, 0.2) 50%, transparent 50%);
    }
    
    .book-corner.bottom-left {
      bottom: 10px;
      left: 10px;
      border-right: none;
      border-top: none;
      background: linear-gradient(45deg, rgba(171, 130, 46, 0.2) 0%, rgba(171, 130, 46, 0.2) 50%, transparent 50%);
    }
    
    .book-corner.bottom-right {
      bottom: 10px;
      right: 10px;
      border-left: none;
      border-top: none;
      background: linear-gradient(315deg, rgba(171, 130, 46, 0.2) 0%, rgba(171, 130, 46, 0.2) 50%, transparent 50%);
    }
    
    /* Spine decoration */
    .cover-spine {
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 100%;
      background: linear-gradient(90deg, #967023, #bfa05b 35%, #ebdcd0 100%);
      box-shadow: 2px 0 5px rgba(0,0,0,0.12);
    }
    
    /* Hanging leather cord with brass leaves */
    .bookmark-cord {
      position: absolute;
      bottom: -45px;
      left: 65px;
      width: 3px;
      height: 80px;
      background: #5c3b22;
      border-radius: 2px;
      transform: rotate(14deg);
      box-shadow: 2px 3px 6px rgba(0,0,0,0.3);
      z-index: 10;
      transition: transform 1.5s ease;
    }
    
    .bookmark-leaf {
      position: absolute;
      bottom: -15px;
      left: -8px;
      width: 18px;
      height: 25px;
      background: linear-gradient(135deg, #d4af37, #ab822e);
      border-radius: 0 100% 0 100%;
      transform: rotate(-15deg);
      box-shadow: 1px 2px 4px rgba(0,0,0,0.35);
    }
    
    .bookmark-leaf-2 {
      position: absolute;
      bottom: -20px;
      left: 1px;
      width: 15px;
      height: 22px;
      background: linear-gradient(135deg, #ab822e, #8c671a);
      border-radius: 0 100% 0 100%;
      transform: rotate(32deg);
      box-shadow: 1px 2px 4px rgba(0,0,0,0.35);
    }

    /* Cover Artwork & Titles */
    .cover-design {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: -10px;
    }
    
    .hands-svg {
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
      margin-bottom: 25px;
    }
    
    .cover-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 2.1rem;
      color: #1e293b;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 700;
      line-height: 1.2;
    }
    
    .cover-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: #64748b;
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .cover-click-prompt {
      position: absolute;
      bottom: 35px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      color: #7f8e9c;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: pulseText 2s infinite alternate;
    }
    
    @keyframes pulseText {
      0% { opacity: 0.4; }
      100% { opacity: 0.9; }
    }

    /* Open book pages spread (Desktop vs Mobile) */
    .book-page {
      position: absolute;
      width: 98%;
      height: 98%;
      top: 1%;
      left: 1%;
      background-color: #faf8f5;
      box-shadow: 2px 4px 15px rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      z-index: 2;
      overflow-y: auto;
      box-sizing: border-box;
      padding: 40px 30px;
      scrollbar-width: thin;
      scrollbar-color: #ab822e #faf8f5;
    }

    /* 3D Page Turning Styles */
    .book-page-turn {
      position: absolute;
      width: 98%;
      height: 98%;
      top: 1%;
      left: 1%;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
      z-index: 4;
    }
    
    .book-page-front, .book-page-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 6px;
      box-sizing: border-box;
      overflow-y: auto;
    }
    
    .book-page-front {
      background-color: #faf8f5;
      z-index: 2;
      width: 100% !important;
      height: 100% !important;
      top: 0 !important;
      left: 0 !important;
    }
    
    .book-page-back {
      background-color: #f5f2eb;
      background-image: 
        repeating-linear-gradient(90deg, rgba(0,0,0,0.005) 0px, rgba(0,0,0,0.005) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.005) 0px, rgba(0,0,0,0.005) 1px, transparent 1px, transparent 4px);
      transform: rotateY(180deg);
      box-shadow: inset 8px 0 16px rgba(0,0,0,0.08);
      border-radius: 6px;
    }

    .book-page-stationary {
      z-index: 2;
    }

    /* Page Turn Navigation Buttons */
    .next-page-btn, .prev-page-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 22px;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #ab822e;
      background: transparent;
      border: 1.5px solid rgba(171, 130, 46, 0.4);
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 25px;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    
    .next-page-btn {
      align-self: flex-end;
    }
    
    .prev-page-btn {
      align-self: flex-start;
      margin-top: 15px;
    }
    
    .next-page-btn:hover, .prev-page-btn:hover {
      color: #1e293b;
      background: rgba(171, 130, 46, 0.1);
      border-color: #ab822e;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(171, 130, 46, 0.15);
    }

    .next-page-btn:active, .prev-page-btn:active {
      transform: translateY(0);
    }

    /* Page Turn Media Queries (Responsive) */
    @media (min-width: 901px) {
      .book-page-turn.flipped {
        transform: rotateY(-155deg);
        box-shadow: -15px 15px 35px rgba(0, 0, 0, 0.35);
      }
    }
    
    @media (max-width: 900px) {
      .book-page-turn.flipped {
        transform: translateX(-110%) rotateY(-20deg);
        opacity: 0;
        pointer-events: none;
        box-shadow: none;
      }
    }
    
    /* Double gold border on paper page */
    .book-page::before {
      content: '';
      position: absolute;
      top: 15px;
      bottom: 15px;
      left: 15px;
      right: 15px;
      border: 1.5px solid #d4af37;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0.55;
    }
    
    .book-page::after {
      content: '';
      position: absolute;
      top: 20px;
      bottom: 20px;
      left: 20px;
      right: 20px;
      border: 0.5px solid #d4af37;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0.35;
    }

    /* Elegant Letter Styling */
    .letter-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    
    .letter-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-style: italic;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }
    
    .letter-body {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: #334155;
      line-height: 1.85;
      margin-bottom: 16px;
      font-weight: 400;
      text-align: justify;
    }
    
    .letter-signoff {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: #1e293b;
      margin-top: 25px;
    }
    
    .letter-sender {
      font-family: 'Sacramento', cursive;
      font-size: 2.2rem;
      color: #ab822e;
      margin-top: 2px;
      line-height: 1;
    }
    
    .letter-invitation {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-style: italic;
      color: #475569;
      margin-top: 35px;
      text-align: center;
      border-top: 1px dashed rgba(171, 130, 46, 0.25);
      padding-top: 20px;
      line-height: 1.6;
    }
    
    .cta-btn {
      display: block;
      margin: 20px auto 10px auto;
      padding: 12px 30px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 1.5px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #161536, #2d2a6b);
      border: 1.5px solid #ab822e;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(22, 21, 54, 0.4), 0 0 10px rgba(171, 130, 46, 0.15);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 42, 107, 0.55), 0 0 18px rgba(171, 130, 46, 0.45);
      background: linear-gradient(135deg, #2d2a6b, #3f3b9c);
      border-color: #fef08a;
    }
    
    .cta-btn:active {
      transform: translateY(0);
    }

    /* Desktop vs Mobile Responsive Book Layout styles */
    @media (min-width: 901px) {
      .book-cover.flipped {
        transform: rotateY(-155deg);
        box-shadow: -15px 15px 35px rgba(0, 0, 0, 0.35);
      }
      .book-cover.flipped .bookmark-cord {
        transform: rotate(-160deg) translateY(20px) translateX(20px);
      }
    }
    
    @media (max-width: 900px) {
      /* On mobile/tablet, flip cover opens flat by sliding left and fading out for ideal letter screen space */
      .book-cover.flipped {
        transform: translateX(-110%) rotateY(-20deg);
        opacity: 0;
        pointer-events: none;
        box-shadow: none;
      }
    }

    /* Twinkling Night Sky View */
    #sky-view {
      position: fixed;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      width: calc(100vw + 40px);
      height: calc(100vh + 40px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease, transform 0.1s ease-out;
      z-index: 1;
      overflow: hidden;
      /* Use user's blacksky.webp, layered with a bottom-vignette to mask any watermarks */
      background: url('photos/blacksky_couple.png') no-repeat center bottom / cover;
      transform: translate(0, 0);
      will-change: transform;
    }
    
    #sky-view.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    #sky-container {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform: translate(0, 0);
      transition: transform 0.1s ease-out;
      will-change: transform;
    }
    
    /* Polaroid Carousel Elements */
    .polaroid-image-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.1;
      overflow: hidden;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    
    .polaroid-photo {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    
    .polaroid-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(14, 16, 28, 0.6);
      color: #fff;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      z-index: 12;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .polaroid-nav-btn:hover {
      background: rgba(14, 16, 28, 0.9);
      color: #fef08a;
      transform: translateY(-50%) scale(1.1);
    }
    
    .polaroid-nav-btn:active {
      transform: translateY(-50%) scale(0.95);
    }
    
    .polaroid-prev-btn {
      left: 12px;
    }
    
    .polaroid-next-btn {
      right: 12px;
    }
    
    .polaroid-counter {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(14, 16, 28, 0.7);
      color: #fff;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-family: 'Montserrat', sans-serif;
      border-radius: 20px;
      font-weight: 600;
      pointer-events: none;
      z-index: 12;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Twinkling Stars */
    .twinkle-star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.25); }
    }

    /* Memory Star */
    .memory-star {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 
        0 0 10px 4px rgba(254, 240, 138, 0.85),
        0 0 22px 8px rgba(234, 179, 8, 0.55);
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      animation: starPulse 2.5s infinite alternate ease-in-out;
    }
    
    /* Vertical Flare Line */
    .memory-star::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 24px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.9), transparent);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: height 0.35s ease;
    }
    
    /* Horizontal Flare Line */
    .memory-star::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.9), transparent);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: width 0.35s ease;
    }
    
    @keyframes starPulse {
      0% {
        transform: translate(-50%, -50%) scale(0.85);
        box-shadow: 
          0 0 8px 3px rgba(254, 240, 138, 0.7),
          0 0 18px 6px rgba(234, 179, 8, 0.4);
      }
      100% {
        transform: translate(-50%, -50%) scale(1.15);
        box-shadow: 
          0 0 14px 5px rgba(254, 240, 138, 0.95),
          0 0 28px 10px rgba(234, 179, 8, 0.75);
      }
    }
    
    .memory-star:hover {
      transform: translate(-50%, -50%) scale(1.4);
      background: #fff;
      box-shadow: 
        0 0 18px 6px rgba(254, 240, 138, 1),
        0 0 36px 14px rgba(234, 179, 8, 0.9);
    }
    
    .memory-star:hover::before {
      height: 38px;
    }
    
    .memory-star:hover::after {
      width: 38px;
    }
    
    .memory-star-tooltip {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: rgba(10, 12, 22, 0.92);
      border: 1px solid rgba(234, 179, 8, 0.5);
      color: #fef08a;
      padding: 5px 12px;
      font-size: 0.72rem;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      border-radius: 20px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      letter-spacing: 1px;
    }
    
    .memory-star:hover .memory-star-tooltip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* Shooting Star */
    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0) 100%);
      transform-origin: left center;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      animation: shootAnim 1.6s ease-out forwards;
    }
    
    @keyframes shootAnim {
      0% {
        transform: translate(0, 0) rotate(var(--angle, -35deg)) scaleX(0);
        opacity: 0;
      }
      15% {
        opacity: 1;
        transform: translate(0, 0) rotate(var(--angle, -35deg)) scaleX(1);
      }
      100% {
        transform: translate(var(--deltaX, -300px), var(--deltaY, 210px)) rotate(var(--angle, -35deg)) scaleX(0.15);
        opacity: 0;
      }
    }

    /* Memory Card Modal Popup */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 4, 10, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 100;
    }
    
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    .modal-card {
      background: rgba(14, 16, 28, 0.88);
      border: 1.5px solid rgba(234, 179, 8, 0.45);
      box-shadow: 
        0 15px 45px rgba(0,0,0,0.75),
        inset 0 0 30px rgba(234, 179, 8, 0.12);
      border-radius: 16px;
      width: 90%;
      max-width: 440px;
      padding: 24px;
      box-sizing: border-box;
      transform: scale(0.8) translateY(30px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .modal-overlay.active .modal-card {
      transform: scale(1) translateY(0);
    }
    
    /* Close Button inside Card */
    .modal-close-btn {
      position: absolute;
      top: 15px;
      right: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.6rem;
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 10;
    }
    
    .modal-close-btn:hover {
      color: #fef08a;
    }

    /* Polaroid frame keepsakes */
    .polaroid-frame {
      background: #fdfdfc;
      padding: 12px 12px 24px 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .polaroid-photo {
      width: 100%;
      aspect-ratio: 1.1;
      object-fit: cover;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    
    .polaroid-date {
      font-family: 'Sacramento', cursive;
      font-size: 1.95rem;
      color: #475569;
      margin-top: 12px;
      margin-bottom: 2px;
      line-height: 1;
      text-align: center;
    }
    
    .polaroid-caption {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: #1e293b;
      text-align: center;
      line-height: 1.55;
      padding: 0 5px;
      margin-top: 8px;
      word-break: break-word;
    }
    
    .modal-close-hint {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 16px;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.6;
      animation: pulseCloseHint 2.5s infinite alternate;
    }
    
    @keyframes pulseCloseHint {
      0% { opacity: 0.35; }
      100% { opacity: 0.75; }
    }

    // =========================================================================

    let devMode = false;

    // Apply configuration values to HTML
    document.getElementById('loader-title-text').innerHTML = letterConfig.titleLoaderText;
    document.getElementById('cover-title-label').innerText = letterConfig.coverTitle;
    document.getElementById('cover-subtitle-label').innerText = letterConfig.coverSubtitle;

    // Render the letter text inside the book across two pages
    function renderLetter() {
      const containerP1 = document.getElementById('letter-content-p1');
      const containerP2 = document.getElementById('letter-content-p2');
      
      // Page 1: Greeting + Paragraphs 1-3 + Next Button
      let htmlP1 = `<div class="letter-greeting">${letterConfig.recipient}</div>`;
      for (let i = 0; i < 3; i++) {
        if (letterConfig.paragraphs[i]) {
          htmlP1 += `<p class="letter-body">${letterConfig.paragraphs[i]}</p>`;
        }
      }
      htmlP1 += `
        <button class="next-page-btn" onclick="flipPage(true)">Read Next Page ➔</button>
      `;
      containerP1.innerHTML = htmlP1;
      
      // Page 2: Paragraphs 4-5 + Signoff + Sender + Invitation + Prev Button & CTA Button
      let htmlP2 = "";
      for (let i = 3; i < letterConfig.paragraphs.length; i++) {
        if (letterConfig.paragraphs[i]) {
          htmlP2 += `<p class="letter-body">${letterConfig.paragraphs[i]}</p>`;
        }
      }
      htmlP2 += `
        <div class="letter-signoff">${letterConfig.signoff}</div>
        <div class="letter-sender">${letterConfig.sender}</div>
        <div class="letter-invitation">${letterConfig.skyInvitation}</div>
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 15px;">
          <button class="cta-btn" onclick="transitionToSky()">${letterConfig.ctaButtonText}</button>
          <button class="prev-page-btn" onclick="flipPage(false)">◀ Previous Page</button>
        </div>
      `;
      containerP2.innerHTML = htmlP2;
    }

    // Page turning logic
    function flipPage(forward) {
      const pageTurn = document.getElementById('book-page-turn');
      if (forward) {
        pageTurn.classList.add('flipped');
      } else {
        pageTurn.classList.remove('flipped');
      }
    }

    // Initialize letter
    renderLetter();

    // Loader Timeline
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('loader-overlay');
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
          // Show the book container
          document.getElementById('book-container').classList.add('visible');
        }, 1500);
      }, 4000);
    });

    // Book Cover Open click
    const bookCover = document.getElementById('book-cover');
    const book = document.getElementById('book');
    bookCover.addEventListener('click', () => {
      if (!bookCover.classList.contains('flipped')) {
        bookCover.classList.add('flipped');
        book.classList.add('opened');
      }
    });

    // Transition from Letter to Starry Sky
    function transitionToSky() {
      // Fade out book container
      const bookContainer = document.getElementById('book-container');
      bookContainer.classList.add('dissolve');
      
      // Update body bg class
      document.body.classList.add('sky-active');
      
      // Fade in starry sky view
      const skyView = document.getElementById('sky-view');
      skyView.classList.add('active');
      
      // Initialize stars
      initStars();
      initMemoryStars();
      startShootingStars();
      initParallax();
    }

    // Twinkling Star Field generation
    function initStars() {
      const container = document.getElementById('sky-container');
      const count = 120;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'twinkle-star';
        
        // Random sizes, 1px to 3px
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        // Restrict twinkling stars to the sky region (top 55%) so they don't cover the couple/ground
        star.style.top = `${Math.random() * 55}%`;
        
        // Random twinkle speeds & offsets
        const duration = Math.random() * 4 + 2; // 2s to 6s
        const delay = Math.random() * 5;
        star.style.animation = `twinkle ${duration}s infinite ease-in-out`;
        star.style.animationDelay = `${delay}s`;
        
        // Soft colored tints
        const colorVal = Math.random();
        if (colorVal > 0.85) {
          star.style.background = '#bfdbfe'; // blue
        } else if (colorVal > 0.70) {
          star.style.background = '#fef08a'; // yellow
        } else {
          star.style.background = '#ffffff';
        }
        
        container.appendChild(star);
      }
    }

    // Memory Stars generation
    function initMemoryStars() {
      const container = document.getElementById('sky-container');
      memories.forEach((memory, index) => {
        const star = document.createElement('div');
        star.className = 'memory-star';
        star.style.left = `${memory.x}%`;
        star.style.top = `${memory.y}%`;
        
        // Date tooltip
        const tooltip = document.createElement('div');
        tooltip.className = 'memory-star-tooltip';
        tooltip.innerText = memory.date;
        star.appendChild(tooltip);
        
        // Click handler
        star.addEventListener('click', (e) => {
          e.stopPropagation(); // prevent modal close trigger
          openMemory(memory);
        });
        
        container.appendChild(star);
      });
    }

    // Modal Keepsake Carousel Logic
    let activePhotos = [];
    let currentPhotoIndex = 0;

    function openMemory(memory) {
      activePhotos = memory.photos;
      currentPhotoIndex = 0;
      
      document.getElementById('modal-date').innerText = memory.date;
      document.getElementById('modal-caption').innerText = memory.quote;
      
      updateModalPhoto();
      
      document.getElementById('modal-overlay').classList.add('active');
    }

    function updateModalPhoto() {
      const photoImg = document.getElementById('modal-photo');
      const prevBtn = document.getElementById('polaroid-prev-btn');
      const nextBtn = document.getElementById('polaroid-next-btn');
      const counter = document.getElementById('polaroid-counter');
      
      photoImg.src = activePhotos[currentPhotoIndex];
      
      if (activePhotos.length <= 1) {
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        counter.style.display = 'none';
      } else {
        prevBtn.style.display = 'flex';
        nextBtn.style.display = 'flex';
        counter.style.display = 'block';
        counter.innerText = `${currentPhotoIndex + 1} / ${activePhotos.length}`;
      }
    }

    function prevPhoto(e) {
      e.stopPropagation(); // Prevent modal close click
      currentPhotoIndex = (currentPhotoIndex - 1 + activePhotos.length) % activePhotos.length;
      updateModalPhoto();
    }

    function nextPhoto(e) {
      e.stopPropagation(); // Prevent modal close click
      currentPhotoIndex = (currentPhotoIndex + 1) % activePhotos.length;
      updateModalPhoto();
    }

    function closeModal() {
      const modal = document.getElementById('modal-overlay');
      modal.classList.remove('active');
    }

    // Close modal by clicking outside
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('modal-overlay');
      if (modal.classList.contains('active')) {
        // If the target is the overlay itself, close
        if (e.target === modal || !e.target.closest('.modal-card')) {
          closeModal();
        }
      }
    });

    // Shooting Star generator
    function triggerShootingStar() {
      const container = document.getElementById('sky-container');
      const star = document.createElement('div');
      star.className = 'shooting-star';
      
      // Random coordinates (mostly top right towards bottom left, strictly in sky)
      const startX = Math.random() * 50 + 45; // 45% to 95%
      const startY = Math.random() * 20 + 5;  // 5% to 25% (strictly upper sky)
      star.style.left = `${startX}%`;
      star.style.top = `${startY}%`;
      
      // Angle and distance calculations
      const angle = Math.random() * 15 - 40; // -25deg to -40deg
      const deltaX = - (Math.random() * 200 + 200); // travel -200px to -400px
      const deltaY = - deltaX * Math.tan((angle * Math.PI) / 180);
      const duration = Math.random() * 0.7 + 1.1; // 1.1s to 1.8s
      
      star.style.setProperty('--angle', `${angle}deg`);
      star.style.setProperty('--deltaX', `${deltaX}px`);
      star.style.setProperty('--deltaY', `${deltaY}px`);
      star.style.animationDuration = `${duration}s`;
      
      container.appendChild(star);
      
      star.addEventListener('animationend', () => {
        star.remove();
      });
    }

    // Shooting Star recursive loop
    function startShootingStars() {
      function loop() {
        const delay = Math.random() * 2000 + 8000; // 8s to 10s delay
        setTimeout(() => {
          triggerShootingStar();
          loop();
        }, delay);
      }
      loop();
    }

    // Mousemove Parallax Effect
    function initParallax() {
      const skyView = document.getElementById('sky-view');
      const skyContainer = document.getElementById('sky-container');
      
      skyView.addEventListener('mousemove', (e) => {
        const normX = (e.clientX / window.innerWidth) - 0.5;
        const normY = (e.clientY / window.innerHeight) - 0.5;
        
        // Background shifts slowly (depth layer 1)
        const bgShiftX = normX * -15;
        const bgShiftY = normY * -15;
        
        // Stars shift faster (depth layer 2), creating depth
        const starsShiftX = normX * -30;
        const starsShiftY = normY * -30;
        
        skyView.style.transform = `translate(${bgShiftX}px, ${bgShiftY}px)`;
        skyContainer.style.transform = `translate(${starsShiftX}px, ${starsShiftY}px)`;
      });
    }

    // Developer Mode Coord Logging
    window.addEventListener('keydown', (e) => {
      // Toggle dev mode on pressing 'D' or 'd'
      if ((e.key === 'd' || e.key === 'D') && document.getElementById('sky-view').classList.contains('active')) {
        devMode = !devMode;
        toggleDevMode();
      }
    });

    function toggleDevMode() {
      const banner = document.getElementById('dev-banner');
      if (devMode) {
        banner.classList.add('active');
        console.log("%cDev Mode: Active 🛠️. Click anywhere on the sky to log coordinates.", "color: #ef4444; font-size: 13px; font-weight: bold;");
      } else {
        banner.classList.remove('active');
        // Clear all temporary red click markers
        const markers = document.querySelectorAll('.dev-marker');
        markers.forEach(m => m.remove());
      }
    }

    // Register sky click for Dev Mode
    const skyViewContainer = document.getElementById('sky-view');
    skyViewContainer.addEventListener('click', (e) => {
      if (!devMode) return;
      
      const rect = skyViewContainer.getBoundingClientRect();
      const clickX = ((e.clientX - rect.left) / rect.width) * 100;
      const clickY = ((e.clientY - rect.top) / rect.height) * 100;
      
      const x = parseFloat(clickX.toFixed(1));
      const y = parseFloat(clickY.toFixed(1));
      
      const snippet = `{ photos: ["photos/your-pic.jpg"], date: "Jan 14 2026", quote: "caption here", x: ${x}, y: ${y} },`;
      console.log(snippet);
      
      createDevMarker(x, y, snippet);
    });

    // Create a temporary dev marker in Dev Mode
    function createDevMarker(x, y, snippet) {
      const container = document.getElementById('sky-container');
      const marker = document.createElement('div');
      marker.className = 'dev-marker';
      marker.style.left = `${x}%`;
      marker.style.top = `${y}%`;
      
      const tooltip = document.createElement('div');
      tooltip.className = 'dev-marker-tooltip';
      tooltip.innerText = `${x}%, ${y}% (Copy Code)`;
      marker.appendChild(tooltip);
      
      marker.addEventListener('click', (e) => {
        e.stopPropagation(); // prevent sky re-click trigger
        
        navigator.clipboard.writeText(snippet).then(() => {
          tooltip.innerText = "Copied! 👍";
          tooltip.style.background = "#22c55e"; // green
          
          setTimeout(() => {
            tooltip.innerText = `${x}%, ${y}% (Copy Code)`;
            tooltip.style.background = "#ef4444"; // restore red
          }, 1500);
        }).catch(err => {
          console.error("Clipboard copy failed: ", err);
        });
      });
      
      container.appendChild(marker);
    }
  </script>
</body>
</html>
